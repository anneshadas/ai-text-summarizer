<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>🤖 AI Text Summarizer</h1>
            <p>Powered by BERT & BART Transformer Models</p>
        </div>

        <!-- Input Section -->
        <div class="card">
            <label>Paste Your Text</label>
            <textarea id="inputText"
                placeholder="Paste your article or text here (50-1000 words)..."
                rows="10">
            </textarea>
            <div class="word-count">
                Word Count: <span id="wordCount">0</span> / 1000
            </div>
        </div>

        <!-- Options Section -->
        <div class="card options">

            <div class="option-group">
                <label>Method</label>
                <select id="method">
                    <option value="abstractive">Abstractive (BART)</option>
                    <option value="extractive">Extractive (BERT)</option>
                </select>
            </div>

            <div class="option-group" id="abstractiveOptions">
                <label>Max Length</label>
                <input type="number" id="maxLength"
                       value="150" min="50" max="300">
            </div>

            <div class="option-group" id="extractiveOptions" style="display:none">
                <label>Sentences</label>
                <input type="number" id="numSentences"
                       value="5" min="1" max="15">
            </div>

        </div>

        <!-- Button -->
        <button id="summarizeBtn" onclick="summarize()">
            ✨ Summarize
        </button>

        <!-- Loading -->
        <div id="loading" style="display:none">
            <div class="spinner"></div>
            <p>AI is thinking... Please wait</p>
        </div>

        <!-- Error -->
        <div id="error" class="error" style="display:none"></div>

        <!-- Result Section -->
        <div id="resultCard" class="card" style="display:none">
            <label>Summary</label>
            <div id="summaryText" class="summary-box"></div>

            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="originalWords">-</span>
                    <span class="stat-label">Original Words</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="summaryWords">-</span>
                    <span class="stat-label">Summary Words</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="compression">-</span>
                    <span class="stat-label">Compression %</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="methodUsed">-</span>
                    <span class="stat-label">Method</span>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
